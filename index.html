<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Planned Work</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="app-header">
    <h1>Planned Work</h1>
    <div class="header-right">
      <span id="file-status" class="file-status">No file connected</span>
      <button id="open-file-btn" class="btn">Open Data File</button>
      <button id="new-file-btn" class="btn">New Data File</button>
      <label class="btn file-import-label" id="import-label">
        Import CSV
        <input type="file" id="import-input" accept=".csv" class="hidden" />
      </label>
      <button id="export-btn" class="btn hidden">Download CSV</button>
      <button id="export-png-btn" class="btn">Export to PNG</button>
      <button id="add-task-btn" class="btn btn-primary" disabled>+ Add Task</button>
    </div>
  </header>

  <p id="fallback-notice" class="fallback-notice hidden">
    Your browser doesn't support direct file editing (Chrome/Edge only). Use
    <strong>Import CSV</strong> to load tasks.csv, make changes, then
    <strong>Download CSV</strong> and save it back over tasks.csv.
  </p>

  <main id="board" class="board">
    <section class="column" data-sprint="0">
      <h2 class="column-title">Next</h2>
      <div class="card-list" data-sprint="0"></div>
    </section>
    <section class="column" data-sprint="1">
      <h2 class="column-title">Next+1</h2>
      <div class="card-list" data-sprint="1"></div>
    </section>
  </main>

  <div id="modal-backdrop" class="modal-backdrop hidden">
    <form id="task-form" class="modal">
      <h2 id="modal-title">Add Task</h2>
      <input type="hidden" id="task-id" />

      <label for="task-title">Title</label>
      <input type="text" id="task-title" required maxlength="200" />

      <label for="task-type">Type</label>
      <select id="task-type" required></select>

      <label for="task-sprint">Column</label>
      <select id="task-sprint" required>
        <option value="0">Next</option>
        <option value="1">Next+1</option>
      </select>

      <div class="modal-actions">
        <button type="button" id="delete-task-btn" class="btn btn-danger hidden">Delete</button>
        <div class="modal-actions-right">
          <button type="button" id="cancel-btn" class="btn">Cancel</button>
          <button type="submit" class="btn btn-primary">Save</button>
        </div>
      </div>
    </form>
  </div>

  <script src="app.js"></script>
</body>
</html>
